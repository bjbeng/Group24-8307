##
## IndustryAgent Nginx 配置
## 用途：HTTPS 反代 + 静态前端 + /api / /ws 转发后端
## 替换：YOUR_DOMAIN → 你的实际域名
##

server {
    listen 80;
    server_name YOUR_DOMAIN;
    # HTTP → HTTPS 强制跳转
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # ── Let's Encrypt 证书（certbot 自动填写） ─────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── 安全响应头 ──────────────────────────────────────────────────────────
    add_header X-Frame-Options          DENY            always;
    add_header X-Content-Type-Options   nosniff         always;
    add_header Referrer-Policy          strict-origin   always;
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' wss://YOUR_DOMAIN" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # ── 上传大小限制（与后端 MAX_UPLOAD_MB 对齐） ─────────────────────────
    client_max_body_size 55m;

    # ── 前端静态文件 ────────────────────────────────────────────────────────
    root /opt/industryagent/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # 静态资源长缓存
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # ── API 反代（HTTP → 后端 uvicorn） ────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;   # 审核单文档最多 240s，给余量
        proxy_send_timeout 300s;
    }

    # ── WebSocket 反代 ──────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "Upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 3600s;   # WebSocket 长连接
        proxy_send_timeout 3600s;
    }

    # ── Let's Encrypt challenge ─────────────────────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── 屏蔽敏感路径 ────────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }
    location ~ \.(env|db|sqlite3|log)$ {
        deny all;
    }
}
