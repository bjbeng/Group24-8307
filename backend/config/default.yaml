# Industry Agent 默认配置
# 模型可插拔：替换为更大模型时只改这里，业务代码不动

llm:
  # provider 选择：api（OpenAI-compatible，对接 vLLM/ollama/远端）或 mock（测试用）
  provider: api

  # OpenAI-compatible API 配置
  api:
    base_url: https://yunwu.ai/v1
    api_key: sk-Zf2U8PuKoTvVXwzGr3f70oigC2XnjVJxtnwbVlQrfMkh1htp
    timeout: 120
    max_retries: 2

  # ── 全局兜底（当角色专属配置缺失时使用）────────────────────────────
  # CLI 通过 LLM_BASE_URL/LLM_API_KEY 覆盖 api.base_url/api_key
  text_model: deepseek-v3.2
  vision_model: Qwen3-VL-4B-Instruct

  # ── 角色专属配置（打标阶段：A/B 用不同模型/服务商）──────────────────
  # 场景一：Explorer A = DeepSeek，Explorer B = Qwen
  # 场景二：Explorer A = Qwen，   Explorer B = Gemini（VL）
  #
  # 每个角色可指定独立的 base_url / api_key / model
  # 缺省时 fallback 到全局 api 配置

  explorer_a:                             # 打标 Explorer A
    base_url: https://yunwu.ai/v1
    api_key: sk-Zf2U8PuKoTvVXwzGr3f70oigC2XnjVJxtnwbVlQrfMkh1htp
    model: deepseek-v3.2                  # 场景一用
    temperature: 0.2                      # A 稍高温度 → 多样性
    max_tokens: 2048

  explorer_b:                             # 打标 Explorer B
    base_url: https://yunwu.ai/v1
    api_key: sk-Zf2U8PuKoTvVXwzGr3f70oigC2XnjVJxtnwbVlQrfMkh1htp
    model: qwen3.5-plus                   # 场景一用
    temperature: 0.0                      # B 确定性输出
    max_tokens: 2048

  critic:                                 # 仲裁 Critic（推理强）
    base_url: https://yunwu.ai/v1
    api_key: sk-Zf2U8PuKoTvVXwzGr3f70oigC2XnjVJxtnwbVlQrfMkh1htp
    model: deepseek-v3.2                  # deepseek-reasoner 不可用，换用 v3.2

  vision:                                 # 场景二视觉分析
    base_url: http://localhost:8000/v1
    api_key: EMPTY
    model: Qwen3-VL-4B-Instruct           # 或 gemini-1.5-flash（支持 vision）

# 路径
paths:
  data_dir: ./data
  db_path: ./data/audit.db
  docs_dir: ./data/docs
  images_dir: ./data/images
  results_dir: ./data/results
  fixtures_dir: ./tests/fixtures
  chroma_db_path: ""   # 留空时读 CHROMA_DB_PATH 环境变量；仍为空则用 backend/data/chroma_db

# 文档解析
parse:
  doc_to_docx_timeout: 60        # LibreOffice 转换超时（秒）
  pdf_scan_text_threshold: 50    # PDF 单页文字少于此值视为扫描件
  ocr_enabled: false             # 默认关闭 PaddleOCR（按需开启）
  use_mineru: true               # 启用 MinerU 统一解析（带 bbox 坐标）；支持 PDF/DOCX/DOC
  mineru_backend: pipeline       # MinerU 后端：pipeline（本地）或 vlm-transformers
  mineru_language: ch            # 文档语言提示
  mineru_cluster_ports: []      # 多实例集群端口，如 [8001,8002,8003]，空则单机模式

# 切块
chunk:
  max_tokens: 800                # 单个 text chunk 上限
  table_inline_rows: 10          # ≤ 此行数的表保留在父 chunk
  anchor_text_length: 30         # anchor_text 取前 N 字符用于批注定位

# 检索
retrieve:
  fts_top_k: 3                   # 标准条款检索 top-k
  use_jieba: true                # FTS5 索引前用 jieba 分词

# 审核
audit:
  per_doc_timeout: 240           # 单文档软目标延迟（秒）
  batch_concurrency: 5           # 批量处理并发文档数
  dim_concurrency: 4             # 单文档内并发维度数（Explorer A‖B 之外的维度级并发）
